<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RetroLink - Detalhes do Arquivo</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #004e98;
            color: #000;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            width: 760px;
            margin: 0 auto;
            padding: 15px;
        }

        .header {
            background-color: #000080;
            color: #fff;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px inset #ffffff;
            text-align: center;
        }

        .icon-box {
            text-align: center;
            font-size: 72px;
            margin-bottom: 10px;
        }

        .panel {
            background-color: #e0e0e0;
            border: 2px inset #ffffff;
            padding: 12px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            border: 1px solid #808080;
        }

        th {
            width: 170px;
            text-align: left;
            background-color: #d4d0c8;
            border: 1px outset #ffffff;
            padding: 6px;
            font-weight: normal;
        }

        td {
            border-bottom: 1px solid #e0e0e0;
            padding: 6px;
        }

        .btn {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 7px 14px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 13px;
            color: #000;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            border-style: inset;
            background-color: #c0c0c0;
        }

        .download-btn {
            font-size: 18px;
            font-weight: bold;
            padding: 10px 18px;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin: 0;">📄 Detalhes do Arquivo</h1>
        </div>

        <div class="icon-box">{{ icon }}</div>

        <div class="panel">
            <table>
                <tr>
                    <th>Nome</th>
                    <td>{{ name }}</td>
                </tr>
                <tr>
                    <th>Caminho Relativo</th>
                    <td>{{ relative_path }}</td>
                </tr>
                <tr>
                    <th>Tamanho</th>
                    <td>{{ size }}</td>
                </tr>
                <tr>
                    <th>Data de Modificação</th>
                    <td>{{ modified }}</td>
                </tr>
                <tr>
                    <th>Extensão</th>
                    <td>{{ extension }}</td>
                </tr>
            </table>
        </div>

        <div style="text-align: center; margin-bottom: 10px;">
            <a href="{{ download_url }}" class="btn download-btn">⬇️ Baixar Arquivo</a>
        </div>

        <div class="footer">
            <a href="{{ back_url }}" class="btn">← Voltar</a>
        </div>
    </div>
</body>
</html>
