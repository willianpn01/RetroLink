<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>RetroLink - Bloco de Notas Compartilhado</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #004e98;
            color: #000;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            width: 860px;
            margin: 0 auto;
            padding: 15px;
        }

        .header {
            background-color: #000080;
            color: #fff;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px inset #ffffff;
            text-align: center;
        }

        .panel {
            background-color: #e0e0e0;
            border: 2px inset #ffffff;
            padding: 12px;
        }

        .btn {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 6px 14px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 12px;
            cursor: pointer;
            color: #000;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            border-style: inset;
            background-color: #c0c0c0;
        }

        textarea {
            width: 100%;
            min-height: 380px;
            border: 1px solid #808080;
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.4;
            padding: 8px;
            box-sizing: border-box;
            white-space: pre;
            overflow: auto;
            background-color: #fff;
            color: #000;
        }

        .success {
            margin: 0 0 10px 0;
            padding: 8px;
            border: 1px solid #2b8c2b;
            background-color: #dff5df;
            color: #0b5f0b;
            font-weight: bold;
        }

        .muted {
            margin-top: 8px;
            font-size: 11px;
            color: #404040;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin: 0;">📝 Bloco de Notas Compartilhado</h1>
        </div>

        <div style="margin-bottom: 10px;">
            <a href="/classico" class="btn">← Voltar para arquivos</a>
        </div>

        <div class="panel">
            {% if salvo %}
            <div class="success">✅ Notas salvas com sucesso!</div>
            {% endif %}

            <form method="post" action="/classico/notas" enctype="multipart/form-data">
                <textarea name="conteudo" rows="20">{{ conteudo }}</textarea>
                <div style="margin-top: 10px;">
                    <button type="submit" class="btn">💾 Salvar</button>
                </div>
            </form>

            <div class="muted">Última modificação: {{ ultima_modificacao }}</div>
        </div>
    </div>
</body>
</html>
