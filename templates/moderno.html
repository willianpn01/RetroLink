<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroLink - Modo Moderno</title>
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS via CDN para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons para os ícones modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .drag-active { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        {% raw %}
        const { useState, useEffect, useRef } = React;

        // Componente wrapper seguro para ícones do Lucide
        // Isso previne que o Lucide altere o DOM diretamente (substituindo a tag <i> por um <svg>)
        // e quebre o React DOM (causando o erro "Failed to execute 'removeChild'")
        function Icon({ name, className = "" }) {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            
            return <span ref={iconRef} style={{ display: 'contents' }}></span>;
        }

                function App() {
            const [currentSection, setCurrentSection] = useState('arquivos');
            const [bibliotecas, setBibliotecas] = useState([]);
            const [bibliotecaAtivaId, setBibliotecaAtivaId] = useState(null);

            const fetchBibliotecas = async (preferredId = null) => {
                try {
                    const res = await fetch('/api/bibliotecas');
                    if (!res.ok) throw new Error('Falha ao carregar bibliotecas');
                    const data = await res.json();
                    const libs = data.bibliotecas || [];
                    setBibliotecas(libs);

                    const classica = libs.find(l => l.classico);
                    const current = libs.find(l => l.id === bibliotecaAtivaId);
                    const preferred = libs.find(l => l.id === preferredId);
                    const next = preferred?.id || current?.id || classica?.id || libs[0]?.id || null;
                    setBibliotecaAtivaId(next);
                } catch (e) {
                    console.error(e);
                }
            };

            useEffect(() => {
                fetchBibliotecas();
            }, []);

            const bibliotecaAtiva = bibliotecas.find(l => l.id === bibliotecaAtivaId) || null;

            const renderContent = () => {
                switch(currentSection) {
                    case 'arquivos': return <FilesSection bibliotecaAtivaId={bibliotecaAtivaId} bibliotecaAtiva={bibliotecaAtiva} key={`arquivos-${bibliotecaAtivaId || 'none'}`} />;
                    case 'fotos': return <PhotosSection bibliotecaAtivaId={bibliotecaAtivaId} bibliotecaAtiva={bibliotecaAtiva} key={`fotos-${bibliotecaAtivaId || 'none'}`} />;
                    case 'musica': return <MusicSection bibliotecaAtivaId={bibliotecaAtivaId} bibliotecaAtiva={bibliotecaAtiva} key={`musica-${bibliotecaAtivaId || 'none'}`} />;
                    case 'videos': return <VideosSection bibliotecaAtivaId={bibliotecaAtivaId} bibliotecaAtiva={bibliotecaAtiva} key={`videos-${bibliotecaAtivaId || 'none'}`} />;
                    case 'organizar': return <OrganizePhotosSection />;
                    case 'duplicatas': return <DuplicatesSection />;
                    case 'converter': return <ConverterSection />;
                    case 'backup': return <BackupSection />;
                    case 'versoes': return <VersionsSection />;
                    case 'configuracoes': return <SettingsSection bibliotecas={bibliotecas} bibliotecaAtivaId={bibliotecaAtivaId} refreshBibliotecas={fetchBibliotecas} />;
                    default: return <FilesSection bibliotecaAtivaId={bibliotecaAtivaId} bibliotecaAtiva={bibliotecaAtiva} key={`arquivos-${bibliotecaAtivaId || 'none'}-default`} />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    <div className="w-64 bg-white border-r border-gray-200 flex flex-col">
                        <div className="p-6 border-b border-gray-200 bg-blue-600 text-white">
                            <h1 className="text-2xl font-black tracking-tight flex items-center gap-2">
                                <Icon name="hard-drive" />
                                RetroLink
                            </h1>
                            <p className="text-blue-200 text-sm mt-1 font-medium">Media Server</p>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2 overflow-auto">
                            <div className="mb-3">
                                <p className="px-3 text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-2">Bibliotecas</p>
                                <div className="space-y-1">
                                    {bibliotecas.map((lib) => (
                                        <button
                                            key={lib.id}
                                            onClick={() => { setBibliotecaAtivaId(lib.id); setCurrentSection('arquivos'); }}
                                            className={`w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg text-sm transition-colors ${
                                                bibliotecaAtivaId === lib.id ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'
                                            }`}
                                            title={lib.caminho}
                                        >
                                            <span className="flex items-center gap-2 min-w-0">
                                                <span>{lib.icone || '📁'}</span>
                                                <span className="truncate">{lib.nome}</span>
                                            </span>
                                            {lib.classico && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded">XP</span>}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <p className="px-3 text-[11px] font-semibold uppercase tracking-wider text-gray-400 mb-2">Seções</p>
                            {[
                                { id: 'arquivos', icon: 'folder', label: 'Arquivos' },
                                { id: 'fotos', icon: 'image', label: 'Fotos' },
                                { id: 'musica', icon: 'music', label: 'Músicas' },
                                { id: 'videos', icon: 'film', label: 'Vídeos' },
                                { id: 'organizar', icon: 'folder-tree', label: 'Organizar' },
                                { id: 'duplicatas', icon: 'copy', label: 'Duplicatas' },
                                { id: 'converter', icon: 'refresh-cw', label: 'Converter' },
                                { id: 'backup', icon: 'database-backup', label: 'Backup' },
                                { id: 'versoes', icon: 'history', label: 'Versões' },
                                { id: 'configuracoes', icon: 'settings', label: 'Configurações' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setCurrentSection(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium ${
                                        currentSection === item.id 
                                        ? 'bg-blue-50 text-blue-600 shadow-sm' 
                                        : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'
                                    }`}
                                >
                                    <Icon name={item.icon} className="w-5 h-5" />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    <div className="flex-1 overflow-hidden bg-gray-50/50">
                        {renderContent()}
                    </div>
                </div>
            );
        }
function Placeholder({ title }) {
                        return (
                <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <Icon name="clock" className="w-16 h-16 mb-4 text-gray-300" />
                    <h2 className="text-2xl font-semibold mb-2">{title}</h2>
                    <p>Esta seção estará disponível em breve na próxima fase.</p>
                </div>
            );
        }

        // --- SEÇÃO: FOTOS ---
        function PhotosSection({ bibliotecaAtivaId, bibliotecaAtiva }) {
            const [files, setFiles] = useState([]);
            const [currentPath, setCurrentPath] = useState("");
            const [loading, setLoading] = useState(true);
            const [selectedPhoto, setSelectedPhoto] = useState(null);
            const [exifData, setExifData] = useState(null);
            const observerRef = useRef(null);

            const fetchPhotos = async (path = "") => {
                setLoading(true);
                try {
                    const response = await fetch(`/api/files?path=${encodeURIComponent(path)}&biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`);
                    const data = await response.json();
                    
                    // Filtra apenas pastas e arquivos de imagem
                    const imgExts = ['.jpg', '.jpeg', '.png', '.gif', '.bmp', '.webp'];
                    const filtered = data.files.filter(f => 
                        f.is_dir || imgExts.some(ext => f.name.toLowerCase().endsWith(ext))
                    );
                    
                    setFiles(filtered);
                    setCurrentPath(data.current_path);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchPhotos(currentPath); }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                
                // Configura Lazy Loading das imagens
                observerRef.current = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            if (img.dataset.src) {
                                img.src = img.dataset.src;
                                img.removeAttribute('data-src');
                                observerRef.current.unobserve(img);
                            }
                        }
                    });
                }, { rootMargin: '200px' });

                const imgs = document.querySelectorAll('.lazy-image');
                imgs.forEach(img => observerRef.current.observe(img));

                return () => observerRef.current && observerRef.current.disconnect();
            }, [files]);

            const openLightbox = async (photo) => {
                setSelectedPhoto(photo);
                setExifData(null);
                try {
                    const res = await fetch(`/api/exif?path=${encodeURIComponent(photo.path)}&biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`);
                    if (res.ok) setExifData(await res.json());
                } catch (e) {}
            };

            const navigateLightbox = (direction) => {
                const photosOnly = files.filter(f => !f.is_dir);
                const currentIndex = photosOnly.findIndex(f => f.path === selectedPhoto.path);
                let newIndex = currentIndex + direction;
                if (newIndex < 0) newIndex = photosOnly.length - 1;
                if (newIndex >= photosOnly.length) newIndex = 0;
                if (photosOnly[newIndex]) openLightbox(photosOnly[newIndex]);
            };

            return (
                <div className="p-8 h-full flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Galeria de Fotos</h2>
                            <div className="text-sm text-gray-500 mt-1">{currentPath ? `${bibliotecaAtiva?.nome || 'Biblioteca'}/${currentPath}` : `${bibliotecaAtiva?.nome || 'Biblioteca'}/`}</div>
                        </div>
                        {currentPath && (
                            <button onClick={() => fetchPhotos(currentPath.split('/').slice(0,-1).join('/'))} className="btn-modern">
                                <Icon name="arrow-left" className="w-4 h-4" /> Voltar
                            </button>
                        )}
                    </div>

                    <div className="flex-1 overflow-auto">
                        {loading ? (
                            <div className="flex justify-center items-center h-40"><Icon name="loader-2" className="w-8 h-8 animate-spin text-gray-400" /></div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                {files.map((f, idx) => (
                                    <div key={idx} className="aspect-square bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all group"
                                         onClick={() => f.is_dir ? fetchPhotos(f.path) : openLightbox(f)}>
                                        {f.is_dir ? (
                                            <div className="w-full h-full flex flex-col items-center justify-center bg-gray-50 text-blue-500">
                                                <Icon name="folder" className="w-12 h-12 mb-2" />
                                                <span className="text-sm font-medium text-gray-700 text-center px-2 truncate w-full">{f.name}</span>
                                            </div>
                                        ) : (
                                            <div className="relative w-full h-full bg-gray-100">
                                                <img 
                                                    data-src={`/api/thumbnail?path=${encodeURIComponent(f.path)}&biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`}
                                                    className="lazy-image w-full h-full object-cover"
                                                    alt={f.name}
                                                />
                                                <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/60 to-transparent p-2 pt-6 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <p className="text-white text-xs truncate">{f.name}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Lightbox */}
                    {selectedPhoto && (
                        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center">
                            <button className="absolute top-4 right-4 text-white p-2 hover:bg-white/20 rounded-full" onClick={() => setSelectedPhoto(null)}>
                                <Icon name="x" className="w-6 h-6" />
                            </button>
                            
                            <button className="absolute left-4 text-white p-4 hover:bg-white/20 rounded-full" onClick={() => navigateLightbox(-1)}>
                                <Icon name="chevron-left" className="w-8 h-8" />
                            </button>
                            
                            <img src={`/classico/download/${encodeURIComponent(selectedPhoto.path)}?biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`} className="max-h-[90vh] max-w-[80vw] object-contain" />
                            
                            <button className="absolute right-4 text-white p-4 hover:bg-white/20 rounded-full" onClick={() => navigateLightbox(1)}>
                                <Icon name="chevron-right" className="w-8 h-8" />
                            </button>

                            {/* EXIF Panel */}
                            <div className="absolute bottom-4 left-4 right-4 md:left-auto md:w-80 bg-black/60 backdrop-blur-md text-white p-4 rounded-xl text-sm">
                                <p className="font-semibold mb-2 truncate">{selectedPhoto.name}</p>
                                {exifData ? (
                                    <div className="space-y-1 text-gray-300">
                                        {exifData.date && <p><span className="text-gray-400">Data:</span> {exifData.date}</p>}
                                        {exifData.make && <p><span className="text-gray-400">Câmera:</span> {exifData.make} {exifData.model}</p>}
                                        {exifData.resolution && <p><span className="text-gray-400">Resolução:</span> {exifData.resolution}</p>}
                                        {Object.keys(exifData).length === 0 && <p className="italic text-gray-500">Sem metadados EXIF</p>}
                                    </div>
                                ) : <p className="animate-pulse text-gray-400">Carregando metadados...</p>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SEÇÃO: MÚSICA ---
        function MusicSection({ bibliotecaAtivaId, bibliotecaAtiva }) {
            const [files, setFiles] = useState([]);
            const [currentPath, setCurrentPath] = useState("");
            const [loading, setLoading] = useState(true);
            const [currentTrack, setCurrentTrack] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [duration, setDuration] = useState(0);
            const [volume, setVolume] = useState(1);
            
            // Playlist no LocalStorage
            const [playlist, setPlaylist] = useState(() => {
                const saved = localStorage.getItem('retrolink_playlist');
                return saved ? JSON.parse(saved) : [];
            });
            const [viewMode, setViewMode] = useState('folder'); // 'folder' | 'playlist'
            
            const audioRef = useRef(null);
            const nextRef = useRef(null);
            const isSeekingRef = useRef(false);

            useEffect(() => {
                localStorage.setItem('retrolink_playlist', JSON.stringify(playlist));
            }, [playlist]);

            useEffect(() => {
                if (!audioRef.current) {
                    audioRef.current = new Audio();
                    audioRef.current.addEventListener('timeupdate', () => {
                        if (!isSeekingRef.current) {
                            setProgress(audioRef.current.currentTime);
                        }
                    });
                    audioRef.current.addEventListener('loadedmetadata', () => setDuration(audioRef.current.duration));
                    // Executa a ref para evitar stale closure
                    audioRef.current.addEventListener('ended', () => nextRef.current && nextRef.current());
                }
                
                // Cleanup: pausa a música ao sair da aba de Músicas
                return () => {
                    if (audioRef.current) {
                        audioRef.current.pause();
                        audioRef.current.src = "";
                    }
                };
            }, []);

            const fetchMusic = async (path = "") => {
                setLoading(true);
                try {
                    const response = await fetch(`/api/files?path=${encodeURIComponent(path)}&biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`);
                    const data = await response.json();
                    const audioExts = ['.mp3', '.flac', '.ogg', '.wav', '.m4a'];
                    const filtered = data.files.filter(f => 
                        f.is_dir || audioExts.some(ext => f.name.toLowerCase().endsWith(ext))
                    );
                    setFiles(filtered);
                    setCurrentPath(data.current_path);
                } catch (err) {} finally { setLoading(false); }
            };

            useEffect(() => { fetchMusic(currentPath); }, []);
            
            const playTrack = (track) => {
                if (currentTrack?.path === track.path) {
                    if (isPlaying) audioRef.current.pause();
                    else audioRef.current.play();
                    setIsPlaying(!isPlaying);
                    return;
                }
                
                // Se tocou da pasta, adiciona na playlist automaticamente (se não existir)
                if (viewMode === 'folder') {
                    setPlaylist(prev => {
                        if (!prev.some(t => t.path === track.path)) return [...prev, track];
                        return prev;
                    });
                }

                setCurrentTrack(track);
                audioRef.current.src = `/api/audio-stream?path=${encodeURIComponent(track.path)}&biblioteca_id=${encodeURIComponent(bibliotecaAtivaId || '')}`;
                audioRef.current.play();
                setIsPlaying(true);
            };

            const togglePlaylist = (e, track) => {
                e.stopPropagation();
                setPlaylist(prev => {
                    if (prev.some(t => t.path === track.path)) return prev.filter(t => t.path !== track.path);
                    return [...prev, track];
                });
            };

            const getQueue = () => viewMode === 'playlist' ? playlist : files.filter(f => !f.is_dir);

            const handleNext = () => {
                const q = getQueue();
                if (!q.length || !currentTrack) return;
                const idx = q.findIndex(f => f.path === currentTrack.path);
                if (idx !== -1 && idx + 1 < q.length) playTrack(q[idx + 1]);
            };

            const handlePrev = () => {
                const q = getQueue();
                if (!q.length || !currentTrack) return;
                const idx = q.findIndex(f => f.path === currentTrack.path);
                if (idx > 0) playTrack(q[idx - 1]);
            };

            // Mantém a ref do handleNext sempre atualizada com as states mais recentes
            useEffect(() => { nextRef.current = handleNext; });

            const formatTime = (secs) => {
                if (isNaN(secs)) return "0:00";
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const handleSeekInput = (e) => {
                if (!audioRef.current || !duration) return;
                const newTime = parseFloat(e.target.value);
                audioRef.current.currentTime = newTime;
                setProgress(newTime);
            };

            const handleSeekStart = () => {
                isSeekingRef.current = true;
            };

            const handleSeekEnd = (e) => {
                handleSeekInput(e);
                isSeekingRef.current = false;
            };

            const handleVolume = (e) => {
                const vol = parseFloat(e.target.value);
                setVolume(vol);
                audioRef.current.volume = vol;
            };

            const renderList = () => {
                const list = viewMode === 'playlist' ? playlist : files;
                if (list.length === 0) return <tr><td colSpan="4" className="px-6 py-12 text-center text-gray-400">{viewMode === 'playlist' ? 'Sua playlist está vazia.' : 'Pasta vazia'}</td></tr>;
                
                return list.map((f, idx) => (
                    <tr key={idx} className={`border-b border-gray-100 hover:bg-gray-50 cursor-pointer ${currentTrack?.path === f.path ? 'bg-blue-50' : ''}`}
                        onClick={() => f.is_dir ? fetchMusic(f.path) : playTrack(f)}>
                        <td className="px-6 py-4 w-12 text-gray-400">
                            {f.is_dir ? <Icon name="folder" className="w-5 h-5 text-blue-500" /> : 
                             currentTrack?.path === f.path && isPlaying ? <Icon name="bar-chart-2" className="w-5 h-5 text-blue-600" /> : 
                             <Icon name="music" className="w-5 h-5" />}
                        </td>
                        <td className={`px-6 py-4 font-medium ${currentTrack?.path === f.path ? 'text-blue-600' : 'text-gray-700'}`}>
                            {f.name}
                        </td>
                        <td className="px-6 py-4 text-right text-sm text-gray-500 w-32">{f.size || 'N/A'}</td>
                        <td className="px-6 py-4 text-right w-16">
                            {!f.is_dir && (
                                <button onClick={(e) => togglePlaylist(e, f)} className={`p-2 rounded-full hover:bg-gray-200 transition-colors ${playlist.some(t => t.path === f.path) ? 'text-blue-600' : 'text-gray-400'}`} title="Adicionar/Remover da Playlist">
                                    <Icon name="list-music" className="w-5 h-5" />
                                </button>
                            )}
                        </td>
                    </tr>
                ));
            };

            return (
                <div className="p-8 h-full flex flex-col relative pb-32">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Biblioteca Musical</h2>
                            <div className="flex items-center gap-4 mt-2">
                                <div className="bg-gray-200 p-1 rounded-lg inline-flex">
                                    <button onClick={() => setViewMode('folder')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${viewMode === 'folder' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>Navegar Pastas</button>
                                    <button onClick={() => setViewMode('playlist')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${viewMode === 'playlist' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>Minha Playlist ({playlist.length})</button>
                                </div>
                                {viewMode === 'folder' && <span className="text-sm text-gray-500">{currentPath ? `${bibliotecaAtiva?.nome || 'Biblioteca'}/${currentPath}` : `${bibliotecaAtiva?.nome || 'Biblioteca'}/`}</span>}
                            </div>
                        </div>
                        {viewMode === 'folder' && currentPath && (
                            <button onClick={() => fetchMusic(currentPath.split('/').slice(0,-1).join('/'))} className="btn-modern">
                                <Icon name="arrow-left" className="w-4 h-4" /> Voltar
                            </button>
                        )}
                    </div>

                    <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 overflow-auto">
                        <table className="w-full text-left">
                            <tbody>
                                {renderList()}
                            </tbody>
                        </table>
                    </div>

                    {/* Fixed Player */}
                    <div className="fixed bottom-0 left-64 right-0 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 px-8 flex items-center gap-6 z-10">
                        <div className="w-1/3 flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                                <Icon name="music-4" className="w-6 h-6" />
                            </div>
                            <div className="overflow-hidden">
                                <p className="font-semibold text-gray-800 truncate">{currentTrack?.name || "Nenhuma faixa selecionada"}</p>
                                <p className="text-xs text-gray-500 truncate">RetroLink Player</p>
                            </div>
                        </div>
